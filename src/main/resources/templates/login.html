<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gym Admin Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#000000,#1a1a1a,#000000);
            font-family:'Orbitron',sans-serif;
            overflow:hidden;
        }

        .container {
            background:rgba(255,255,255,0.05);
            padding:50px;
            border-radius:20px;
            text-align:center;
            backdrop-filter:blur(20px);
            box-shadow:0 0 40px rgba(0,255,200,0.4);
            width:350px;
        }

        h1 {
            color:#00ffcc;
            margin-bottom:30px;
            letter-spacing:3px;
        }

        input {
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:16px;
        }

        button {
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#00ffcc;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover {
            background:#00cc99;
        }

        .dumbbell {
            font-size:60px;
            margin-bottom:20px;
            animation: lift 1.5s infinite alternate ease-in-out;
        }

        @keyframes lift {
            from { transform:translateY(0px); }
            to { transform:translateY(-15px); }
        }

        .error {
            color:red;
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="dumbbell">🏋</div>

    <h1>GYM ADMIN</h1>

    <div th:if="${param.error}" class="error">
        Invalid username or password
    </div>

    <div th:if="${param.logout}" style="color:#00ffcc;">
        Logged out successfully
    </div>

    <form th:action="@{/login}" method="post">

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">LOGIN</button>

    </form>

</div>

</body>
</html>
